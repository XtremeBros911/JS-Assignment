<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q6 - Contest Score Judge</title>
</head>
<body>
<script>
  const a = parseInt(prompt("Enter correct answers (a):"));
  const b = parseInt(prompt("Enter partially correct answers (b):"));
  const c = parseInt(prompt("Enter wrong answers (c):"));

  let score = 3 * a + b - 2 * c;

  if (score < 0) {
    score = 0;
  }

  if (a + b + c > 50) {
    score -= 10;
  }

  const status = score >= 60 ? "PASS" : "FAIL";

  alert("Score: " + score + ", " + status);
</script>
</body>
</html>
