<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q1 - Digit Gatekeeper</title>
</head>
<body>
<script>
  function isPrime(n) {
    if (n < 2) return false;
    for (let i = 2; i * i <= n; i++) {
      if (n % i === 0) return false;
    }
    return true;
  }

  function digitSum(n) {
    let sum = 0;
    while (n > 0) {
      sum += n % 10;
      n = Math.floor(n / 10);
    }
    return sum;
  }

  function hasZeroDigit(n) {
    while (n > 0) {
      if (n % 10 === 0) return true;
      n = Math.floor(n / 10);
    }
    return false;
  }

  const L = parseInt(prompt("Enter L:"));
  const R = parseInt(prompt("Enter R:"));
  const K = parseInt(prompt("Enter K:"));

  let count = 0;
  for (let x = L; x <= R; x++) {
    if (x % K === 0 && isPrime(digitSum(x)) && !hasZeroDigit(x)) {
      count++;
    }
  }

  alert("Count: " + count);
</script>
</body>
</html>
